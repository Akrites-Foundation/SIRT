<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 1180" width="940" height="1180"><defs><marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 z" fill="#0B3D5C"/></marker><marker id="ahr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 z" fill="#C0392B"/></marker></defs><rect x="0" y="0" width="940" height="1180" rx="0" fill="#FFFFFF"/><text x="50" y="52" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B7285" text-anchor="start" letter-spacing="2">AKRITES READ-IN PROCESS</text><text x="50" y="88" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" font-weight="bold" fill="#0B3D5C" text-anchor="start">Per-Case Read-In Workflow</text><text x="50" y="116" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="normal" fill="#5B6672" text-anchor="start">How a person is added to a single pre-disclosure case (process doc §4)</text><rect x="50" y="132" width="46" height="5" fill="#12B886"/><rect x="70" y="160" width="460" height="62" rx="10" fill="#FFFFFF" stroke="#0B3D5C" stroke-width="1.5"/><circle cx="104" cy="191.0" r="19" fill="#0B3D5C"/><text x="104" y="197.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">1</text><text x="138" y="185.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B3D5C" text-anchor="start">Nominate</text><text x="138" y="207.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12.5" font-weight="normal" fill="#5B6672" text-anchor="start">Finder, WG, maintainer, or delegated authority proposes a person + role</text><line x1="300.0" y1="222" x2="300.0" y2="262" stroke="#0B3D5C" stroke-width="2.2" marker-end="url(#ah)"/><rect x="70" y="262" width="460" height="62" rx="10" fill="#FFFFFF" stroke="#0B3D5C" stroke-width="1.5"/><circle cx="104" cy="293.0" r="19" fill="#0B3D5C"/><text x="104" y="299.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">2</text><text x="138" y="287.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B3D5C" text-anchor="start">Verify</text><text x="138" y="309.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12.5" font-weight="normal" fill="#5B6672" text-anchor="start">SIRT case lead checks the two gates, prerequisites &amp; exclusions</text><line x1="300.0" y1="324" x2="300.0" y2="380" stroke="#0B3D5C" stroke-width="2.2" marker-end="url(#ah)"/><polygon points="300.0,378 450.0,450 300.0,522 150.0,450" fill="#F2F6F9" stroke="#0B3D5C" stroke-width="1.5"/><text x="300.0" y="436" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#0B3D5C" text-anchor="middle">Both gates + prerequisites</text><text x="300.0" y="454" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#0B3D5C" text-anchor="middle">met — and not excluded?</text><text x="300.0" y="476" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#5B6672" text-anchor="middle">(need-to-know AND able to contribute)</text><line x1="450.0" y1="450" x2="560" y2="450" stroke="#C0392B" stroke-width="2.2" marker-end="url(#ahr)"/><text x="460.0" y="442" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#C0392B" text-anchor="start">NO</text><rect x="560" y="416" width="330" height="68" rx="10" fill="#FBEEEC" stroke="#C0392B" stroke-width="1.5"/><text x="578" y="443" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#C0392B" text-anchor="start">Not read in</text><text x="578" y="464" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12.5" font-weight="normal" fill="#1A1F2B" text-anchor="start">Served at public disclosure — no pre-PD access.</text><text x="314.0" y="540" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#12B886" text-anchor="start">YES</text><line x1="300.0" y1="522" x2="300.0" y2="562" stroke="#0B3D5C" stroke-width="2.2" marker-end="url(#ah)"/><rect x="70" y="562" width="460" height="60" rx="10" fill="#FFFFFF" stroke="#0B3D5C" stroke-width="1.5"/><circle cx="104" cy="592.0" r="19" fill="#0B3D5C"/><text x="104" y="598.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">3</text><text x="138" y="586.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B3D5C" text-anchor="start">Approve</text><text x="138" y="608.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12.5" font-weight="normal" fill="#5B6672" text-anchor="start">SIRT case lead; Finder / maintainer consulted on Tier 0–1</text><line x1="300.0" y1="622" x2="300.0" y2="658" stroke="#0B3D5C" stroke-width="2.2" marker-end="url(#ah)"/><rect x="70" y="658" width="460" height="60" rx="10" fill="#FFFFFF" stroke="#0B3D5C" stroke-width="1.5"/><circle cx="104" cy="688.0" r="19" fill="#0B3D5C"/><text x="104" y="694.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">4</text><text x="138" y="682.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B3D5C" text-anchor="start">Grant scoped access</text><text x="138" y="704.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12.5" font-weight="normal" fill="#5B6672" text-anchor="start">Single case repo + channel only — least privilege, nothing else</text><line x1="300.0" y1="718" x2="300.0" y2="754" stroke="#0B3D5C" stroke-width="2.2" marker-end="url(#ah)"/><rect x="70" y="754" width="460" height="60" rx="10" fill="#FFFFFF" stroke="#0B3D5C" stroke-width="1.5"/><circle cx="104" cy="784.0" r="19" fill="#0B3D5C"/><text x="104" y="790.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">5</text><text x="138" y="778.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B3D5C" text-anchor="start">Log</text><text x="138" y="800.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12.5" font-weight="normal" fill="#5B6672" text-anchor="start">Record who, org, role, tier, approver &amp; expiry in the read-in log</text><line x1="300.0" y1="814" x2="300.0" y2="850" stroke="#0B3D5C" stroke-width="2.2" marker-end="url(#ah)"/><rect x="70" y="850" width="460" height="60" rx="10" fill="#FFFFFF" stroke="#0B3D5C" stroke-width="1.5"/><circle cx="104" cy="880.0" r="19" fill="#0B3D5C"/><text x="104" y="886.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">6</text><text x="138" y="874.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B3D5C" text-anchor="start">Time-bound</text><text x="138" y="896.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12.5" font-weight="normal" fill="#5B6672" text-anchor="start">Set expiry to the tier's window (see side panel)</text><line x1="300.0" y1="910" x2="300.0" y2="946" stroke="#0B3D5C" stroke-width="2.2" marker-end="url(#ah)"/><rect x="70" y="946" width="460" height="54" rx="10" fill="#0B7285" stroke="#0B7285" stroke-width="1.5"/><text x="300.0" y="979" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Access active for the tier's window</text><line x1="300.0" y1="1000" x2="300.0" y2="1036" stroke="#0B3D5C" stroke-width="2.2" marker-end="url(#ah)"/><rect x="70" y="1036" width="460" height="54" rx="10" fill="#0B2B45" stroke="#0B2B45" stroke-width="1.5"/><text x="300.0" y="1069" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Access ends at public disclosure or case close</text><rect x="560" y="160" width="330" height="244" rx="10" fill="#F2F6F9" stroke="#D7E2EA" stroke-width="1.5"/><rect x="560" y="160" width="330" height="34" rx="10" fill="#0B3D5C"/><rect x="560" y="178" width="330" height="16" fill="#0B3D5C"/><text x="576" y="183" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="start" letter-spacing="1">STEP 2 — THE GATE CHECK</text><text x="576" y="218" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#0B3D5C" text-anchor="start">Gate 1 — Need to know</text><text x="576" y="238" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" fill="#1A1F2B" text-anchor="start">This case genuinely requires this person.</text><text x="576" y="270" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#0B3D5C" text-anchor="start">Gate 2 — Able to contribute</text><text x="576" y="290" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" fill="#1A1F2B" text-anchor="start">• Analyze / produce a patch</text><text x="576" y="308" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" fill="#1A1F2B" text-anchor="start">• Test the patch</text><text x="576" y="326" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" fill="#1A1F2B" text-anchor="start">• Stage the patch</text><text x="576" y="358" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#0B3D5C" text-anchor="start">Prerequisites (all required)</text><text x="576" y="378" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" fill="#1A1F2B" text-anchor="start">Verified ID · hardware 2FA · signed</text><text x="576" y="395" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" fill="#1A1F2B" text-anchor="start">agreements · sponsor.</text><rect x="560" y="506" width="330" height="255" rx="10" fill="#F2F6F9" stroke="#D7E2EA" stroke-width="1.5"/><rect x="560" y="506" width="330" height="34" rx="10" fill="#E8873A"/><rect x="560" y="524" width="330" height="16" fill="#E8873A"/><text x="576" y="529" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="start" letter-spacing="1">EXPIRY &amp; REVOCATION</text><text x="576" y="564" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#0B3D5C" text-anchor="start">Tiered windows</text><text x="576" y="583" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" fill="#1A1F2B" text-anchor="start">Tier 0 longest → staging gets the least</text><text x="576" y="599" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" fill="#1A1F2B" text-anchor="start">lead time for a safe rollout.</text><text x="576" y="630" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#0B3D5C" text-anchor="start">Auto-expiry</text><text x="576" y="649" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" fill="#1A1F2B" text-anchor="start">At public disclosure or case close.</text><text x="576" y="680" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#0B3D5C" text-anchor="start">Immediate revocation on</text><text x="576" y="700" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" fill="#1A1F2B" text-anchor="start">• Task complete</text><text x="576" y="718" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" fill="#1A1F2B" text-anchor="start">• Departure from sponsoring org</text><text x="576" y="736" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" fill="#1A1F2B" text-anchor="start">• Need-to-know ends</text><text x="576" y="754" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" fill="#1A1F2B" text-anchor="start">• CoC or embargo breach</text><text x="50" y="1152" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" fill="#5B6672" text-anchor="start" font-style="italic">Standing Working Group membership (§5) follows the same two gates, scoped to a WG domain rather than a single case.</text></svg>